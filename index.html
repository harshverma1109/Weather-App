<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css"></link>
    
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather App</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="error" id="error"></div>
        <div class="loading" id="loading">Loading weather data...</div>

        <div class="weather-info" id="weatherInfo">
            <h2 class="city-name" id="cityName"></h2>
            <div class="date" id="date"></div>
            
            <div class="weather-icon" id="weatherIcon"></div>
            
            <div class="temp-display">
                <div class="temperature" id="temperature"></div>
            </div>
            
            <div class="description" id="description"></div>
            
            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
            </div>
        </div>

        <div class="note">
            📌 This demo uses OpenWeatherMap API. You'll need to sign up for a free API key at 
            <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a> 
            and replace 'YOUR_API_KEY' in the code. For demo purposes, try entering "London", "New York", or "Tokyo".
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
